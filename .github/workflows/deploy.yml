name: Deploy to cPanel

on:
  push:
    branches:
      - master    # or "main", adjust to your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: 🚀 Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          host: ${{ secrets.SFTP_HOST }}   # your server IP or domain
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 2298
          localPath: "./dist"              # adjust to your build/output folder
          remotePath: "/home/youruser/public_html" # adjust to your server path


