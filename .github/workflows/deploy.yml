name: Deploy to cPanel

on:
  push:
    branches:
      - master    # or "main", adjust to your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Server
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          host: ${{ secrets.SERVER_HOST }}       # <-- your server IP (e.g. 23.94.230.146) or domain
          port: 2298                             # your SSH port
          username: ${{ secrets.SERVER_USER }}   # usually "root" or your cPanel/SSH user
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          local_path: ./dist
          remote_path: /home/core1.health-ease-hospital.com/public_html



