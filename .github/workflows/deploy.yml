name: 🚀 Deploy Frontend

on:
  push:
    branches:
      - master  # Trigger deploy on pushes to master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Debug SSH key (first few lines only)
      - name: Debug SSH Key
        run: |
          if [ -z "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "❌ SSH key is missing (DEPLOY_KEY secret not set)"
            exit 1
          fi
          echo "✅ SSH key is present."
          echo "${{ secrets.DEPLOY_KEY }}" | head -n 5
          echo "... (truncated)"

      # Step 3: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Create aws-exports.js if missing
      - name: Create aws-exports.js if missing
        run: |
          if [ ! -f src/aws-exports.js ]; then
            echo "export default {};" > src/aws-exports.js
          fi

      # Step 6: Build project
      - name: Build project
        run: npm run build

      # Step 7: Deploy via SFTP
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: ${{ secrets.SERVER_HOST }}
          port: 2298
          username: ${{ secrets.SERVER_USER }}
          ssh_private_key: ${{ secrets.DEPLOY_KEY }}
          local_path: ./dist
          remote_path: /home/coreh3648/public_html
          args: "-o StrictHostKeyChecking=no"

