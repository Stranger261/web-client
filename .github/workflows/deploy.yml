name: 🚀 Deploy Frontend

on:
  push:
    branches:
      - master  # Trigger deploy on pushes to master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Ensure aws-exports.js exists
      - name: Create aws-exports.js if missing
        run: |
          if [ ! -f src/aws-exports.js ]; then
            echo "export default {};" > src/aws-exports.js
          fi

      # Step 5: Build project
      - name: Build project
        run: npm run build

      # Step 6: Backup old public_html
      - name: Backup old public_html
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 2298
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            BACKUP_DIR="/home/core1.health-ease-hospital.com/backups/public_html_$TIMESTAMP"
            mkdir -p /home/core1.health-ease-hospital.com/backups
            cp -r /home/core1.health-ease-hospital.com/public_html $BACKUP_DIR
            echo "✅ Backup created at $BACKUP_DIR"

      # Step 7: Deploy new build (upload dist contents only)
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: ${{ secrets.SERVER_HOST }}
          port: 2298
          username: ${{ secrets.SERVER_USER }}
          ssh_private_key: ${{ secrets.DEPLOY_KEY }}
          local_path: ./dist/**
          remote_path: /home/core1.health-ease-hospital.com/public_html
          args: "-o StrictHostKeyChecking=no"

      # Step 8: Fix permissions
      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 2298
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            find /home/core1.health-ease-hospital.com/public_html -type d -exec chmod 755 {} \;
            find /home/core1.health-ease-hospital.com/public_html -type f -exec chmod 644 {} \;
            echo "✅ Permissions fixed"
