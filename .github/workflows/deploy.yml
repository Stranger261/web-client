name: 🚀 Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22   # or 22

      - name: Install dependencies
        run: npm install

      - name: Create aws-exports.js if missing
        run: |
          if [ ! -f src/aws-exports.js ]; then
            echo "export default {};" > src/aws-exports.js
          fi

      - name: Build project
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2
        with:
          server: ${{ secrets.SERVER_HOST }}
          port: 2298
          username: ${{ secrets.SERVER_USER }}
          ssh_private_key: ${{ secrets.DEPLOY_KEY }}
          # remote_path: '/var/www/html'
          local_path: ./dist
          remote_path: /home/core1.health-ease-hospital.com/public_html
          args: "-o StrictHostKeyChecking=no"
